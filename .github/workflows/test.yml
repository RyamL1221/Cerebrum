# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Cerebrum-AIOS Integration Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Clone AIOS
    - name: Git Clone AIOS
      uses: actions/checkout@v4
      with:
        repository: agiresearch/AIOS
        path: aios_root
        ref: main

    # Verify AIOS clone
    - name: Verify AIOS clone
      run: |
        echo "=== AIOS root directory contents ==="
        ls -la aios_root/
        echo "=== Looking for setup files ==="
        find aios_root/ -name "setup.py" -o -name "pyproject.toml"
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # Install AIOS dependencies
    - name: Install AIOS dependencies
      working-directory: aios_root
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    # Clone Cerebrum into AIOS directory
    - name: Checkout Cerebrum
      uses: actions/checkout@v4
      with:
        path: aios_root/Cerebrum
        ref: ${{ github.ref }}

    # Install Cerebrum
    - name: Install Cerebrum
      run: |
        python -m pip install -e aios_root/Cerebrum/

    # Install and start Ollama BEFORE the kernel so the model is reachable at startup
    - name: Download and install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama serve
      run: |
        ollama serve &
        # Wait for Ollama server to start
        max_wait=30
        start_time=$SECONDS
        while true; do
          if curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "Ollama server started successfully"
            break
          fi
          elapsed=$((SECONDS - start_time))
          if [ $elapsed -ge $max_wait ]; then
            echo "Timeout after ${max_wait} seconds. Ollama server failed to start."
            exit 1
          fi
          echo "Waiting for Ollama server to start... (${elapsed}s elapsed)"
          sleep 1
        done

    - name: Pull Ollama models
      run: |
        ollama pull qwen2.5:7b
        ollama pull nomic-embed-text

    # Create a valid AIOS kernel config with at least one reachable model
    - name: Create AIOS kernel config
      run: |
        mkdir -p aios_root/aios/config
        cat > aios_root/aios/config/config.yaml << 'EOF'
        api_keys:
          openai: ""
          gemini: ""
          groq: ""
          anthropic: ""

        huggingface:
          auth_token: ""
          cache_dir: ""

        llms:
          models:
            - name: "qwen2.5:7b"
              backend: "ollama"
              hostname: "http://localhost:11434"
          router:
            strategy: "sequential"
          bootstrap_url: ""
          log_mode: "console"
          use_context_manager: false

        memory:
          log_mode: "console"
          provider: "mem0"
          auto_extract: true
          auto_inject: true
          relevance_threshold: 0.3
          max_injected_memories: 10
          max_memory_tokens: 2000
          mem0:
            api_key: ""
            user_id: "default"
            llm:
              provider: "ollama"
              config:
                model: "qwen2.5:7b"
                ollama_base_url: "http://localhost:11434"
            embedder:
              provider: "ollama"
              config:
                model: "nomic-embed-text"
                ollama_base_url: "http://localhost:11434"
            vector_store:
              provider: "chroma"
              config:
                collection_name: "mem0_memories"
                path: ".mem0/chroma"

        storage:
          root_dir: "root"
          use_vector_db: true
          vector_db_backend: "chroma"
          qdrant_host: "localhost"
          qdrant_port: 6333
          qdrant_api_key: ""
          qdrant_model_name: "sentence-transformers/all-MiniLM-L6-v2"

        tool:
          mcp_server_script_path: "aios/tool/mcp_server.py"

        scheduler:
          log_mode: "console"

        agent_factory:
          log_mode: "console"

        max_workers: 64

        server:
          host: "localhost"
          port: 8000
        EOF
        echo "Created config.yaml with qwen2.5:7b model entry"

    # Run AIOS kernel
    - name: Run AIOS kernel in background
      run: |
        cd aios_root
        bash runtime/launch_kernel.sh &>../kernel.log &
        KERNEL_PID=$!
        cd ..

        # Set maximum wait time (60 seconds)
        max_wait=60
        start_time=$SECONDS

        # Dynamically check if the process is running until it succeeds or times out
        while true; do
          if ! ps -p $KERNEL_PID > /dev/null; then
            echo "Kernel process died. Checking logs:"
            cat kernel.log
            exit 1
          fi

          if nc -z localhost 8000; then
            if curl -s http://localhost:8000/health; then
              echo "Kernel successfully started and healthy"
              break
            fi
          fi

          # Check if timed out
          elapsed=$((SECONDS - start_time))
          if [ $elapsed -ge $max_wait ]; then
            echo "Timeout after ${max_wait} seconds. Kernel failed to start properly."
            cat kernel.log
            exit 1
          fi

          echo "Waiting for kernel to start... (${elapsed}s elapsed)"
          sleep 1
        done

    - name: Run all tests
      run: |
        cd aios_root/Cerebrum
        
        # Create test results directory
        mkdir -p test_results
        
        # Function to check if a path contains agent or llm
        contains_agent_or_llm() {
          local dir_path=$(dirname "$1")
          if [[ "$dir_path" == *"agent"* || "$dir_path" == *"llm"* ]]; then
            return 0  # True in bash
          else
            return 1  # False in bash
          fi
        }

        # Process test files
        find tests -type f -name "*.py" | while read -r test_file; do
          if contains_agent_or_llm "$test_file"; then
            # For agent or llm directories, only run ollama tests
            if [[ "$test_file" == *"ollama"* ]]; then
              echo "Running Ollama test in agent/llm directory: $test_file"
              python $test_file | tee -a ollama_tests.log
              echo "----------------------------------------"
            fi
          else
            # For other directories, run all tests
            echo "Running test: $test_file"
            python $test_file | tee -a all_tests.log
            echo "----------------------------------------"
          fi
        done

    # Upload logs
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: test-logs
        path: |
          kernel.log
          aios_root/Cerebrum/ollama_tests.log
          aios_root/Cerebrum/agent_tests.log
          aios_root/Cerebrum/test_results/
    # Debug information
    - name: Debug information
      if: failure()
      run: |
        echo "=== Kernel log ==="
        cat kernel.log
        echo "=== Ollama tests log ==="
        cat aios_root/Cerebrum/ollama_tests.log || true
        echo "=== Agent tests log ==="
        cat aios_root/Cerebrum/agent_tests.log || true
        echo "=== Environment variables ==="
        env | grep -i api_key || true
        echo "=== Process status ==="
        ps aux | grep kernel
        ps aux | grep ollama
        echo "=== Directory structure ==="
        find aios_root/Cerebrum/tests -name "*ollama*.py" -type f
